<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | Sandile Tukani University (STU)</title>

  <link rel="icon" type="image/png" href="../assets/logo/STU_logo.png" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/pages.css" />
  <link rel="stylesheet" href="../css/contact.css" />
</head>

<body class="contact-page">
  <nav class="navbar" role="navigation" aria-label="Main Navigation">
    <a href="../index.html" class="brand">
      <img src="../assets/logo/STU_logo.png" alt="STU Logo" class="logo-image" />
    </a>
    <input type="checkbox" id="menu-toggle-checkbox" class="menu-toggle" />
    <label for="menu-toggle-checkbox" class="hamburger-label"><span></span><span></span><span></span></label>
    <ul class="nav-links">
      <li><a href="../index.html">HOME</a></li>
      <li><a href="about.html">ABOUT US</a></li>
      <li><a href="courses.html">COURSES</a></li>
      <li><a href="consultations.html">CONSULTATIONS</a></li>
      <li><a href="media.html">MEDIA</a></li>
      <li><a href="bookstore.html">BOOKSTORE</a></li>
      <li><a href="contact.html" class="active-nav">CONTACT</a></li>
    </ul>
  </nav>

  <main class="contact-page-shell">
    <section class="contact-card">
      <!-- SIDE VISUAL PANEL -->
      <aside class="contact-visual-panel">
        <div class="contact-brand-block">
          <img src="../assets/logo/undoqo-logo.png" alt="uNdoqo Logo" class="contact-side-logo" />
          <h1>Contact Us</h1>
          <p>Join a programme, book a consultation, or send a direct enquiry to the STU knowledge bureau.</p>
        </div>
        <div class="contact-side-details">
          <p><strong>Email</strong><a href="mailto:ask_stu@outlook.com">ask_stu@outlook.com</a></p>
          <p><strong>WhatsApp</strong><a href="https://wa.me/2785509649" target="_blank" rel="noopener">Join Now</a></p>
        </div>
      </aside>

      <!-- FORM SIDE -->
      <section class="contact-form-side">
        <form id="stu-contact-form" class="contact-form" name="stu-contact" method="POST" data-netlify="true">
          <input type="hidden" name="form-name" value="stu-contact" />
          
          <div class="form-row">
            <div class="form-group">
              <label for="first-name">First name</label>
              <input id="first-name" type="text" name="first-name" required />
            </div>
            <div class="form-group">
              <label for="last-name">Last name</label>
              <input id="last-name" type="text" name="last-name" required />
            </div>
          </div>

          <div class="form-group">
            <label for="product">Programme of interest</label>
            <select id="product" name="product" required>
              <option value="" disabled selected>Select option...</option>
              <option value="project-eiinasi">Project ||Ei!nasi</option>
              <option value="project-kora">!Kora Kobab-ada</option>
              <option value="project-kwaxhosa">KwaXhosa Zibenza Zibutya</option>
              <option value="Book Consultation">Book Consultation</option>
              <option value="Book Collab">Book Collaboration</option>
            </select>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" required>Good day STU, I would like to enroll/book this service...</textarea>
          </div>

          <button type="submit" class="contact-submit-btn">Send Inquiry</button>
        </form>
      </section>
    </section>
  </main>

  <footer><p>Sandile Tukani University © 2026 • Reclaim. Correct. Advance.</p></footer>
  <script src="../js/main.js"></script>
  <script src="../js/contact.js"></script>
</body>
</html>
